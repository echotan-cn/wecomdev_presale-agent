<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>企业微信定制开发需求助手</title>
<style>
  :root {
    --primary: #6E5BE6;
    --primary-light: #EEEDFE;
    --primary-hover: #5A47D6;
    --bg: #F4F4F8;
    --card: #FFFFFF;
    --text: #1F1F2C;
    --text-secondary: #5F5F6E;
    --text-muted: #9A9AAA;
    --border: #E5E5EE;
    --border-active: #6E5BE6;
    --bubble: #F2F1FA;
    --shadow: 0 2px 16px rgba(110,91,230,0.08);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Helvetica Neue", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }
  .app { max-width: 880px; margin: 0 auto; padding: 32px 24px 80px; }
  .conversation { display: flex; flex-direction: column; gap: 24px; }

  .ai-msg {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeUp 0.4s ease;
  }
  .avatar {
    flex-shrink: 0;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500;
  }
  .ai-bubble-wrap { flex: 1; max-width: 720px; }
  .ai-name {
    font-size: 13px; color: var(--text-secondary);
    margin-bottom: 6px; display: flex; gap: 8px; align-items: center;
  }
  .ai-tag {
    background: var(--primary-light); color: var(--primary);
    font-size: 11px; padding: 1px 6px; border-radius: 4px;
  }
  .ai-bubble {
    background: var(--bubble);
    padding: 14px 18px;
    border-radius: 4px 14px 14px 14px;
    color: var(--text);
    white-space: pre-wrap;
  }

  .group-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 32px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.45s ease;
  }
  .group-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 18px; border-bottom: 1px dashed var(--border);
    margin-bottom: 22px;
  }
  .group-title {
    display: flex; gap: 10px; align-items: center;
    color: var(--primary); font-size: 15px; font-weight: 500;
  }
  .group-title .icon {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--primary-light); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .group-title .count { color: var(--text-muted); font-weight: 400; font-size: 13px; }
  .progress-pill {
    background: var(--primary-light); color: var(--primary);
    font-size: 12px; padding: 4px 10px; border-radius: 12px;
  }

  .question { margin-bottom: 26px; }
  .question:last-child { margin-bottom: 0; }
  .q-label {
    font-size: 14px; font-weight: 500; color: var(--text);
    margin-bottom: 10px;
  }
  .q-label .qno { color: var(--primary); font-weight: 500; margin-right: 4px; }
  .q-hint {
    font-size: 12px; color: var(--text-muted);
    margin-bottom: 8px; display: flex; gap: 4px; align-items: center;
  }
  .q-hint::before { content: "💡"; font-size: 11px; }

  textarea, input[type="text"], input[type="number"] {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    transition: all 0.15s;
  }
  textarea { min-height: 70px; resize: vertical; }
  textarea:focus, input:focus {
    outline: none;
    background: #fff;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(110,91,230,0.12);
  }
  textarea::placeholder, input::placeholder { color: var(--text-muted); }
  input[type="number"] { width: 90px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--primary); color: var(--primary); }
  .chip.active {
    background: var(--primary-light);
    color: var(--primary);
    border-color: var(--primary);
    font-weight: 500;
  }
  .chip-other-input {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px dashed var(--border); border-radius: 8px;
    padding: 6px 12px; font-size: 13px;
    transition: border-color 0.15s;
    cursor: text;
  }
  .chip-other-input:hover, .chip-other-input:focus-within {
    border-color: var(--primary); border-style: solid;
  }
  .chip-other-input input {
    border: none; background: transparent; padding: 0; width: 160px; min-width: 120px;
    font-size: 13px;
    outline: none;
  }
  .chip-other-input input:focus { box-shadow: none; }
  .chip-other-input.active {
    background: var(--primary-light); border-color: var(--primary); border-style: solid;
  }

  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
  }
  .radio-row:hover { background: var(--bg); }
  .radio-row input[type="radio"] {
    accent-color: var(--primary);
    width: 16px; height: 16px;
  }
  .radio-inline {
    display: flex; flex-wrap: wrap; gap: 14px;
    padding: 4px 0;
  }
  .radio-inline label {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; font-size: 13px;
  }
  .radio-inline input[type="radio"] { accent-color: var(--primary); }

  .checkbox-list { display: flex; flex-direction: column; gap: 8px; }
  .check-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
  }
  .check-row:hover { background: var(--bg); }
  .check-row input[type="checkbox"] { accent-color: var(--primary); }

  .matrix-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .matrix-table th, .matrix-table td {
    border-bottom: 1px solid var(--border);
    padding: 10px 8px; text-align: left;
  }
  .matrix-table th {
    color: var(--text-secondary); font-weight: 500;
    background: var(--bg);
  }
  .matrix-table td input[type="number"],
  .matrix-table td input[type="text"] {
    padding: 6px 8px; font-size: 13px;
  }

  .rank-list { display: flex; flex-direction: column; gap: 6px; }
  .rank-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: var(--bg); border-radius: 6px;
  }
  .rank-item .handle {
    cursor: grab; color: var(--text-muted); font-size: 16px; user-select: none;
  }
  .rank-item .handle:active { cursor: grabbing; }
  .rank-item .text { flex: 1; font-size: 13px; }
  .rank-item.dragging { opacity: 0.4; }
  .rank-item select {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 8px; background: #fff; font-size: 12px;
    accent-color: var(--primary);
  }

  .submit-row {
    margin-top: 26px; padding-top: 18px; border-top: 1px dashed var(--border);
    display: flex; justify-content: flex-end; align-items: center; gap: 12px;
  }
  .submit-tip { color: var(--text-muted); font-size: 12px; }
  .submit-btn {
    background: var(--primary); color: #fff; border: none;
    padding: 10px 22px; border-radius: 8px;
    font-size: 14px; cursor: pointer; transition: all 0.15s;
    font-family: inherit; font-weight: 500;
  }
  .submit-btn:hover { background: var(--primary-hover); }
  .submit-btn:disabled {
    background: #C8C5E5; cursor: not-allowed;
  }
  .submit-btn::after { content: " →"; }

  .typing { display: inline-flex; gap: 4px; align-items: center; }
  .typing span {
    width: 6px; height: 6px; background: var(--primary); border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  .report-card {
    background: linear-gradient(135deg, #fff 0%, #FAFAFE 100%);
    border: 1px solid var(--primary-light);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.5s ease;
  }
  .report-title {
    font-size: 18px; font-weight: 500; color: var(--primary);
    margin-bottom: 8px; display: flex; gap: 10px; align-items: center;
  }
  .report-subtitle { color: var(--text-secondary); font-size: 13px; margin-bottom: 22px; }
  .report-section { margin-bottom: 22px; }
  .report-section h3 {
    font-size: 14px; color: var(--primary); margin-bottom: 8px;
    padding-left: 8px; border-left: 3px solid var(--primary); font-weight: 500;
  }
  .report-section pre {
    background: var(--bg); padding: 14px; border-radius: 8px;
    font-size: 12px; color: var(--text-secondary);
    white-space: pre-wrap; word-break: break-all;
    font-family: "SF Mono", Monaco, "Courier New", monospace;
    max-height: 300px; overflow-y: auto;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  @media (max-width: 600px) {
    .app { padding: 16px 12px; }
    .group-card { padding: 20px 18px; }
    .ai-bubble { padding: 12px 14px; }
  }
</style>
</head>
<body>
<div class="app">
  <div id="conversation" class="conversation"></div>
</div>

<script>
/* =========================================================================
   售前 Agent · 18 题 · 客户答题界面
   骨架+血肉两层架构。题目结构在 GROUPS 里，每题渲染后收集答案到 SLOTS。
   预留 callLLM 接口位，等真实 API 接入。
   ========================================================================= */

const SLOTS = {};
const ROLES_FROM_Q8 = []; /* Q14 矩阵动态依赖 Q8 抽取的角色 */

/* ------------------------- 18 题分组数据 ------------------------- */

const GROUPS = [
  {
    id: 'g1',
    name: '第 1 组 · 基本信息',
    range: '1 - 6 / 17',
    intro: `您好！我是企业微信定制开发需求助手。
为了让我更好地了解您的需求，请先填写以下基本信息。
整套问卷大约 17 道题，分 5 组，过程预计 10–15 分钟。`,
    transition: '好的，我顺着您说的痛点把业务情况摸清楚一下。',
    questions: [
      { id: 'q1', no: 'Q1', label: '请问怎么称呼您？', type: 'text', placeholder: '比如 张总 / 李工 / 思宁' },
      { id: 'q2', no: 'Q2', label: '您所在公司的全称是？', type: 'text', placeholder: '请填写完整公司名' },
      { id: 'q3', no: 'Q3', label: '贵司总体的人员规模大概是？', type: 'radio', options: ['0-10 人', '10-30 人', '30-50 人', '50-100 人', '100-150 人', '150 人及以上'] },
      { id: 'q4', no: 'Q4', label: '贵司主要从事哪个所属行业？', type: 'chips_single', options: ['电商', '教培', '餐饮', 'B2B 销售', '连锁零售', '制造业', '建筑工程', '服务业', '文化传媒', '金融', '医疗'], hasOther: true },
      { id: 'q5', no: 'Q5', label: '本次定制开发想用智能表格服务的业务有哪些主要板块？各板块大致是做什么？', hint: '请说明：① 主要业务板块有哪些 ② 各板块大致是做什么', type: 'textarea', placeholder: '示例：分 3 块——① 前端获客（线索收集+派工）② 签约（合同审批+收款）③ 售后（客诉处理+回访）' },
      { id: 'q6', no: 'Q6', label: '您希望这次的定制开发，主要解决什么问题？最大的痛点是什么？', hint: '可以从"经常出错的环节、最花时间的环节、最费人力的环节"三个角度想', type: 'dynamic_pain_chips', placeholder: '如果上面没列到您的问题，请在这里补充', hasOther: true }
    ]
  },
  {
    id: 'g2',
    name: '第 2 组 · 业务理解',
    range: '7 - 10 / 17',
    intro: '接下来我顺着您说的痛点，把业务情况摸清楚一下。',
    transition: '好的，我对您业务的整体框架已经理解了。接下来我想跟您再细一点聊聊数据怎么落到表里、谁能看哪些、最关心什么数据。',
    questions: [
      { id: 'q7', no: 'Q7', label: '【这道题题目会基于您 Q6 的回答自适应】', dynamicLabel: 'q7', hint: '如果只有一个痛点就直接写细节；多个用换行/编号', type: 'textarea', placeholder: '示例：\n1. 业务员录入重复，工作量太大\n2. 主管看不到订单当前进度\n3. 三向资金对账分散，容易错' },
      { id: 'q8', no: 'Q8', label: '【这道题题目会基于您 Q6 P0 痛点自适应】', dynamicLabel: 'q8', hint: '一句话描述链路，再说说卡点；尽量具体', type: 'textarea', placeholder: '示例：业务员提单 → 中台审批 → 银行放款 → 后台归档；其中归档经常超期，靠人工盯' },
      { id: 'q9', no: 'Q9', label: '这件事现在您是怎么管的？用的是什么工具或方式？这套工具有没有解决您的问题？如果没有完全解决，主要是哪里没解决、为什么没解决？', hint: '"为什么没解决"很关键——直接决定本次方案要规避哪些坑', type: 'textarea', placeholder: '示例：之前上过线下 CRM，因为字段冗余、录入步骤多被弃用；现在用 Excel + 群口播，但主管看不到实时进度，新业务员上手要 1 周，跟进数据没沉淀。' },
      {
        id: 'q10', no: 'Q10', label: '这块业务相关的数据/记录，现在主要存放在哪里、大概有多大量、多久会变一次？',
        type: 'compound',
        children: [
          { id: 'q10_pos', sub: '数据存放位置（多选）', type: 'chips_multi', options: ['Excel 表格', '公司自研系统', '平台后台（如门店收银/管理后台）', 'ERP（用友、金蝶、SAP 等）', '电商 SaaS（聚水潭、有赞等）', 'CRM 系统（销售易、纷享销客等）', '邮件附件', '纸质单据', '还没系统地记录'], hasOther: true },
          { id: 'q10_size', sub: '需要导入到智能表格的业务数据，量级大概多少？', hint: '请尽量贴着您 Q5 提到的业务板块来描述，比如订单方向就告诉我每天/每月下单多少笔；客户方向就告诉我现有多少客户档案。越具体越好。', type: 'textarea', placeholder: '示例：① 客户档案约 4000 家；② 每天新签订单 30-50 笔，月底冲量到 80 笔；③ 售后工单每月 200 单左右' },
          { id: 'q10_freq', sub: '更新频次（单选）', type: 'radio', options: ['实时', '每天多次', '每天 1 次', '每周几次', '每月几次', '不定期', '录入一次基本不变'] }
        ]
      }
    ]
  },
  {
    id: 'g3',
    name: '第 3 组 · 方案细化',
    range: '11 - 14 / 17',
    intro: '接下来我想跟您再细一点聊聊数据怎么落到表里、谁能看哪些。',
    transition: '好的，我已经把方案的骨架搭起来了。接下来还差仪表盘和交付节奏。',
    questions: [
      {
        id: 'q12', no: 'Q12', label: '哪些动作您希望系统自动帮您做，不用人手动操作？',
        hint: '可以从这几个方向想：什么情况下要自动通知谁；哪些字段要根据其他字段自动算出来（比如金额合计、库存=入库-出库）；要不要每天/每月定时提醒或汇总；跨表数据要不要自动联动。',
        type: 'textarea',
        placeholder: '示例：① 订单超期 3 天没出货，自动提醒跟单和主管；② 入库数自动累加到现有库存，扣减出库后实时显示可用库存；③ 每周一早 9 点自动推送上周订单汇总给业务负责人。'
      },
      { id: 'q13', no: 'Q13', label: '数据进入新表格的方式，您希望是怎样的？是大家手动填、批量上传，还是希望和您现有的某个系统打通自动同步？有没有照片/单据需要直接传上来？历史的老数据要不要一起带过来？', type: 'textarea', placeholder: '一段话描述即可，比如：业务员手机端录入；想和金蝶打通；身份证拍照识别；老数据近 6 个月迁过来' },
      { id: 'q14', no: 'Q14', label: '具体到智能表格的使用上，每个角色大概几个人？有没有外部的人（客户、经销商、供应商）也要进来用？', hint: '重点：哪些角色 × 每个角色几个人 × 是否有外部用户', type: 'textarea', placeholder: '示例：业务员 8 人、中台审核 2 人、后台归档 1 人、管理层 2 人；外部经销商需要登录提交进件，约 30 家。' },
      {
        id: 'q15', no: 'Q15', label: '权限上您是怎么考虑的？',
        type: 'compound',
        children: [
          { id: 'q15_field', sub: '① 表里有没有哪些字段，是某些人不能看到的？', type: 'textarea', placeholder: '比如：成本、毛利、提成只让管理层和财务看到' },
          { id: 'q15_row', sub: '② 数据要不要做隔离？比如 A 销售只能看自己的客户、X 部门只看自己部门的数据？', type: 'textarea', placeholder: '比如：销售按归属人隔离；客服按服务区域隔离；管理层看全部' },
          { id: 'q15_readonly', sub: '③ 有没有哪些角色只看不改？', type: 'textarea', placeholder: '比如：管理层只看仪表盘；财务只看金额相关字段' }
        ]
      }
    ]
  },
  {
    id: 'g4',
    name: '第 4 组 · 看板与交付',
    range: '15 - 16 / 17',
    intro: '差不多到收尾了，再聊聊看板和交付节奏。',
    transition: '感谢您耐心配合到这里。最后一个简短的问题。',
    questions: [
      { id: 'q16', no: 'Q16', label: '在仪表盘当中，您希望重点展示什么业务指标？以什么维度进行？', hint: '请写几个核心指标 + 对应的维度（按人/按部门/按时间/按渠道等）', type: 'textarea', placeholder: '示例：\n1. 本月新增线索数（按业务员）\n2. 各阶段订单数（按订单状态）\n3. 业务员业绩排行（按月/季度）\n4. 售后问题分类（按责任部门）' },
      {
        id: 'q17', no: 'Q17', label: '交付节奏上，您希望什么时候能上线？预算大概在什么范围？',
        type: 'compound',
        children: [
          { id: 'q17_time', sub: '期望上线时间', type: 'radio', options: ['1 周内（紧急）', '2 周内', '1 个月内', '2 个月内', '3 个月内', '没具体 deadline，越快越好', '具体日期（请补充）'], hasOther: true },
          { id: 'q17_budget', sub: '预算范围', type: 'radio', options: ['1000 元以内', '1000-3000 元', '3000-5000 元', '5000-10000 元', '10000-15000 元', '15000 元以上', '还没确定，看方案再说'], hasOther: true }
        ]
      }
    ]
  },
  {
    id: 'g5',
    name: '第 5 组 · 补充',
    range: '17 / 17',
    intro: '最后一个问题。',
    transition: '感谢您的耐心，我已经收齐所有需求。正在为您生成一份《客户需求洞察报告》……',
    questions: [

function buildDynamicLabel(q) {
  if (!q.dynamicLabel) return q.label;

  // Q6 可能是 {picked:[...], other:"..."} 或纯文本
  const getQ6Text = () => {
    const q6 = SLOTS.q6;
    if (!q6) return '';
    if (typeof q6 === 'string') return q6;
    if (typeof q6 === 'object') {
      const parts = [];
      if (q6.picked && q6.picked.length) parts.push(...q6.picked);
      if (q6.other) parts.push(q6.other);
      return parts.join('\n');
    }
    return '';
  };

  const splitPains = (text) => {
    if (!text) return [];
    return text.split(/[\n\r、；;,，]|(?:\d+[\.、])/).map(s => s.trim()).filter(s => s.length > 2);
  };

  if (q.dynamicLabel === 'q7') {
    const q6Text = getQ6Text();
    const pains = splitPains(q6Text);
    if (pains.length <= 1) {
      return '您能再具体讲讲这个痛点吗？比如它在什么环节出现、影响有多大、目前怎么应对？';
    }
    return `您提到了好几个痛点，能不能按对您影响最大的程度给它们排个序？最痛的排第一。`;
  }

  if (q.dynamicLabel === 'q8') {
    const q7 = (SLOTS.q7 || '').trim();
    const q6Text = getQ6Text();
    let topic = '';
    if (q7) {
      const firstLine = q7.split(/[\n。；;]/)[0].replace(/^[\d\.、\s]+/, '').trim();
      topic = firstLine.slice(0, 30);
    } else if (q6Text) {
      topic = splitPains(q6Text)[0]?.slice(0, 30) || '';
    }
    if (topic) {
      return `围绕"${topic}"这件事，一笔业务从开始到结束大概要走哪几个环节？每个环节谁负责？中间有没有可能卡住、需要返工或异常处理的情况？`;
    }
    return '围绕您最想解决的这件事，一笔业务从开始到结束大概要走哪几个环节？每个环节谁负责？中间有没有可能卡住、需要返工或异常处理的情况？';
  }

  return q.label;
}

function renderDynamicPainChips(q) {
  const wrap = document.createElement('div');
  wrap.className = 'dynamic-pain-wrap';
  wrap.dataset.qid = q.id;

  // 初始：显示占位提示 + 普通 textarea 兜底
  wrap.innerHTML = `
    <div class="pain-intro" style="margin-bottom:8px;color:var(--text-muted);font-size:13px;">
      💡 选择行业后，系统将根据我们的交付经验为您匹配常见痛点
    </div>
    <textarea data-qid="${q.id}" data-fallback="true" placeholder="${escapeAttr(q.placeholder || '请描述您的痛点…')}" style="min-height:60px;"></textarea>
  `;

  // 延迟：等 Q4 被选择后，用行业拉知识库 chips 替换上面的 textarea
  setTimeout(() => {
    const card = wrap.closest('.group-card');
    if (!card) return;
    // 监听 Q4 chips 容器里的点击
    const q4Wrap = card.querySelector('[data-qid="q4"]');
    if (!q4Wrap) return;

    function onQ4Selected() {
      const active = q4Wrap.querySelector('.chip.active');
      const otherInput = q4Wrap.querySelector('[data-other-input]');
      let industry = '';
      if (active) industry = active.dataset.value;
      else if (otherInput && otherInput.value.trim()) industry = otherInput.value.trim();
      if (!industry) return;

      // 记录到 SLOTS 以供后续使用
      SLOTS.q4 = industry;

      // 拉知识库 pain chips
      loadPainChips(wrap, q, industry);
    }

    // 绑定事件
    q4Wrap.addEventListener('click', () => setTimeout(onQ4Selected, 100));
    // 也绑 input 事件（用户输入"其他"）
    const otherEl = q4Wrap.querySelector('[data-other-input]');
    if (otherEl) otherEl.addEventListener('blur', onQ4Selected);
  }, 200);

  return wrap;
}

async function loadPainChips(wrap, q, industry) {
  // 防重复加载
  if (wrap.dataset.loaded === industry) return;
  wrap.dataset.loaded = industry;

  // 替换内容为 loading
  wrap.innerHTML = `
    <div class="q-hint" style="margin-bottom:8px;">💡 根据我们的知识库和交付经验，<strong>${escapeHtml(industry)}</strong> 行业常遇到以下问题，请勾选您遇到的：</div>
    <div class="pain-chips-loading"><span class="typing"><span></span><span></span><span></span></span> 正在匹配行业痛点…</div>
  `;

  let chips = [];
  try {
    const resp = await fetch(LLM_API_BASE + '/api/industry/pain_chips', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ industry }),
    });
    const data = await resp.json();
    if (data.ok && data.data) chips = data.data;
  } catch (e) { console.warn('pain_chips fetch failed', e); }

  // 清除 loading
  const loading = wrap.querySelector('.pain-chips-loading');
  if (loading) loading.remove();

  if (chips.length === 0) {
    // 没有匹配 → 退化为 textarea
    const hint = wrap.querySelector('.q-hint');
    if (hint) hint.innerHTML = '💡 暂无该行业的预设痛点，请直接描述您的问题：';
    const ta = document.createElement('textarea');
    ta.placeholder = q.placeholder || '请描述您的痛点…';
    ta.dataset.qid = q.id;
    ta.dataset.fallback = 'true';
    wrap.appendChild(ta);
    return;
  }

  // 渲染 chips 多选
  const chipsWrap = document.createElement('div');
  chipsWrap.className = 'chips';
  chipsWrap.dataset.qid = q.id + '_chips';
  chipsWrap.dataset.mode = 'multi';
  chips.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = c.chip_label;
    chip.dataset.value = c.chip_label;
    chip.dataset.sourceId = c.source_id || '';
    chip.addEventListener('click', () => chip.classList.toggle('active'));
    chipsWrap.appendChild(chip);
  });

  // "其他" 输入框
  const otherWrap = document.createElement('div');
  otherWrap.className = 'chip-other-input';
  otherWrap.innerHTML = `<span class="chip-other-label">其他：</span>`;
  const otherInput = document.createElement('input');
  otherInput.type = 'text';
  otherInput.placeholder = q.placeholder || '如果上面没列到，请在这里补充';
  otherInput.dataset.otherInput = 'true';
  otherInput.style.flex = '1';
  otherWrap.appendChild(otherInput);
  otherWrap.addEventListener('click', () => otherInput.focus());

  wrap.appendChild(chipsWrap);
  wrap.appendChild(otherWrap);
}

function renderTextarea(q) {

function renderRadio(q, parentId) {
  const wrap = document.createElement('div');

  if (q.hasOther) {

    const otherInput = document.createElement('input');
    otherInput.type = 'text';
    otherInput.placeholder = '请补充';
    otherInput.style.flex = '1';

    otherInput.addEventListener('focus', () => {
      otherWrap.querySelector('input[type="radio"]').checked = true;
    });
    otherWrap.appendChild(otherInput);
    wrap.appendChild(otherWrap);
  }
  return wrap;
}
function renderChipsSingle(q, parentId) {
  const wrap = document.createElement('div');
  wrap.className = 'chips';
  wrap.dataset.qid = parentId || q.id;
  wrap.dataset.mode = 'single';
  q.options.forEach(opt => {
    const c = document.createElement('div');
    c.className = 'chip';
    c.textContent = opt;
    c.dataset.value = opt;
    c.addEventListener('click', () => {
      wrap.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      const otherIn = wrap.querySelector('[data-other-input]');
      if (otherIn) otherIn.value = '';
    });
    wrap.appendChild(c);
  });
  if (q.hasOther) {
    const otherWrap = document.createElement('span');
    otherWrap.className = 'chip-other-input';
    otherWrap.innerHTML = '<span style="color:var(--text-muted);font-size:13px;">其他：</span>';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = '请补充';
    inp.dataset.otherInput = '1';
    inp.addEventListener('focus', () => {
      wrap.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      otherWrap.classList.add('active');
    });
    inp.addEventListener('blur', () => {
      if (!inp.value.trim()) otherWrap.classList.remove('active');
    });
    inp.addEventListener('input', () => {
      if (inp.value.trim()) otherWrap.classList.add('active');
    });
    // 点整个框 → focus 输入框
    otherWrap.addEventListener('click', () => inp.focus());
    otherWrap.appendChild(inp);
    wrap.appendChild(otherWrap);
  }
  return wrap;
}
function renderChipsMulti(q, parentId) {
  const wrap = document.createElement('div');
  wrap.className = 'chips';
  wrap.dataset.qid = parentId || q.id;
  wrap.dataset.mode = 'multi';
  q.options.forEach(opt => {
    const c = document.createElement('div');

    c.dataset.value = opt;
    c.addEventListener('click', () => c.classList.toggle('active'));
    wrap.appendChild(c);
  });
  if (q.hasOther) {
    const otherWrap = document.createElement('span');
    otherWrap.className = 'chip-other-input';
    otherWrap.innerHTML = '<span style="color:var(--text-muted);font-size:13px;">其他：</span>';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = '请补充';
    inp.dataset.otherInput = '1';
    inp.addEventListener('focus', () => otherWrap.classList.add('active'));
    inp.addEventListener('blur', () => {
      if (!inp.value.trim()) otherWrap.classList.remove('active');
    });
    inp.addEventListener('input', () => {
      if (inp.value.trim()) otherWrap.classList.add('active');
    });
    otherWrap.addEventListener('click', () => inp.focus());
    otherWrap.appendChild(inp);
    wrap.appendChild(otherWrap);
  }
  return wrap;
}
function renderCompound(q) {

/* ------------------------- 提交本组 ------------------------- */

function submitGroup(idx, btn) {
  const card = btn.closest('.group-card');
  const g = GROUPS[idx];
  const groupAns = {};

  g.questions.forEach(q => {
    let ans;
    try {
      ans = collectAnswer(card, q);
    } catch (e) {
      console.error('collectAnswer 失败 for', q.id, e);
      ans = '';
    }
    groupAns[q.id] = ans;
    SLOTS[q.id] = ans;
  });

  console.log('[submitGroup] idx=', idx, 'answers=', groupAns);
  console.log('[submitGroup] all slots so far=', SLOTS);

  /* 立即反馈：按钮置 loading */
  btn.disabled = true;
  btn.textContent = 'AI 思考中…';
  btn.style.background = '#9F8FE8';
  btn.style.cursor = 'wait';
  btn.classList.remove('submit-btn');
  btn.style.padding = '10px 22px';
  btn.style.borderRadius = '8px';
  btn.style.fontSize = '14px';
  btn.style.color = '#fff';
  btn.style.border = 'none';

  /* 锁定本组所有输入 */
  card.querySelectorAll('input, textarea, .chip').forEach(el => {
    if (el.classList.contains('chip')) {
      el.style.pointerEvents = 'none';
      el.style.opacity = el.classList.contains('active') ? '1' : '0.45';
    } else {
      el.disabled = true;
    }
  });

  /* AI 过渡话术：调真实 LLM；等不到时 fallback 到组内 transition 文本 */
  const typingMsg = appendAIMessage('', true);
  const bubbleEl = typingMsg.querySelector('.ai-bubble');
  bubbleEl.innerHTML = `<span class="typing"><span></span><span></span><span></span></span><span style="color:var(--text-muted);font-size:12px;margin-left:8px;">正在结合行业知识库为您生成回应……</span>`;

  (async () => {
    let text = null;
    try {
      text = await callLLM('transition', { groupIdx: idx, slots: SLOTS });
    } catch (e) { console.warn(e); }

    bubbleEl.innerHTML = escapeHtml(text || g.transition);

    /* 按钮转为已提交状态 */
    btn.textContent = '已提交';
    btn.style.background = '#C8C5E5';
    btn.style.cursor = 'default';

    if (idx < GROUPS.length - 1) {
      currentGroup = idx + 1;
      setTimeout(() => renderGroup(currentGroup), 500);
    } else {
      setTimeout(() => renderInsightReport(), 500);
    }
  })();
}

/* ------------------------- 答案收集 ------------------------- */

function collectAnswer(card, q) {
  if (q.type === 'compound') {
    const obj = {};
    q.children.forEach(c => {
      obj[c.id] = collectByType(card, c);
    });
    return obj;
  }
  if (q.type === 'role_matrix') {
    const wrap = card.querySelector(`[data-qid="${q.id}"][data-matrix]`);
    const rows = [];
    wrap.querySelectorAll('tbody tr').forEach(tr => {
      const inputs = tr.querySelectorAll('input');
      const role = inputs[0].value.trim();
      const headcount = inputs[1].value.trim();
      const term = (tr.querySelector('input[type="radio"]:checked') || {}).value || '';
      const remark = inputs[inputs.length - 1].value.trim();
      if (role || headcount) rows.push({ role, headcount, term, remark });
    });
    const ext = collectChipsMulti(wrap.querySelector(`[data-qid="${q.id}_ext"]`));
    return { roles: rows, external: ext };
  }
  if (q.type === 'dynamic_pain_chips') {
    return collectDynamicPainChips(card, q);
  }
  return collectByType(card, q);
}

function collectByType(card, q) {
  switch (q.type) {
    case 'text':
    case 'textarea': {
      const el = card.querySelector(`[data-qid="${q.id}"]`);
      return el ? el.value.trim() : '';
    }
    case 'radio': {
      const wrap = card.querySelector(`[data-qid="${q.id}"]`);
      if (!wrap) return '';
      const checked = wrap.querySelector('input[type="radio"]:checked');
      if (!checked) return '';
      if (checked.value === '__other__') {
        const oi = wrap.querySelector('[data-other-for]');
        return '其他：' + (oi ? oi.value.trim() : '');
      }
      return checked.value;
    }
    case 'chips_single': {
      const wrap = card.querySelector(`[data-qid="${q.id}"]`);
      const active = wrap.querySelector('.chip.active');
      const other = wrap.querySelector('[data-other-input]');
      if (active) return active.dataset.value;
      if (other && other.value.trim()) return '其他：' + other.value.trim();
      return '';
    }
    case 'chips_multi': {
      const wrap = card.querySelector(`[data-qid="${q.id}"]`);
      return collectChipsMulti(wrap);
    }
  }
  return '';
}
function collectChipsMulti(wrap) {
  if (!wrap) return [];
  const arr = [];
  wrap.querySelectorAll('.chip.active').forEach(c => arr.push(c.dataset.value));
  const oi = wrap.querySelector('[data-other-input]');
  if (oi && oi.value.trim()) arr.push('其他：' + oi.value.trim());
  return arr;
}

function collectDynamicPainChips(card, q) {
  const wrap = card.querySelector('.dynamic-pain-wrap');
  if (!wrap) return '';
  // fallback textarea 模式
  const fallbackTa = wrap.querySelector('textarea[data-fallback]');
  if (fallbackTa) return fallbackTa.value.trim();
  // chips 模式
  const chipsWrap = wrap.querySelector('[data-qid="' + q.id + '_chips"]');
  const picked = [];
  if (chipsWrap) {
    chipsWrap.querySelectorAll('.chip.active').forEach(c => picked.push(c.dataset.value));
  }
  const otherInput = wrap.querySelector('[data-other-input]');
  const other = otherInput ? otherInput.value.trim() : '';
  // 返回结构化对象：picked 数组 + other 文本
  if (picked.length === 0 && !other) return '';
  return { picked, other };
}

function isEmpty(v) {
  if (v === null || v === undefined) return true;
  if (typeof v === 'string') return v === '';
  if (Array.isArray(v)) return v.length === 0;
  if (typeof v === 'object') return Object.keys(v).length === 0;
  return false;
}

/* ------------------------- LLM 接口位（已接入 Knot CLI） ------------------------- */

const LLM_API_BASE = 'http://127.0.0.1:5050';
const LLM_TIMEOUT_MS = {
  transition: 60000,   // 过渡话术 60s
  report:    180000,   // 报告 3min
};

async function callLLM(stage, payload) {
  const endpoint = stage === 'report' ? '/api/llm/report' : '/api/llm/transition';
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(),
    LLM_TIMEOUT_MS[stage] || 60000);

  try {
    console.log('[callLLM]', stage, 'request →', payload);
    const resp = await fetch(LLM_API_BASE + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload || {}),
      signal: controller.signal,
    });
    clearTimeout(timer);
    if (!resp.ok) {
      console.warn('[callLLM] HTTP', resp.status);
      return null;
    }
    const data = await resp.json();
    console.log('[callLLM]', stage, 'response ←', data);
    if (!data.ok) {
      console.warn('[callLLM] backend error:', data.error);
      return null;
    }
    return stage === 'report'
      ? (data.data?.markdown || null)
      : (data.data?.text || null);
  } catch (err) {
    clearTimeout(timer);
    if (err.name === 'AbortError') {
      console.warn('[callLLM] 超时（', LLM_TIMEOUT_MS[stage], 'ms）');
    } else {
      console.warn('[callLLM] fetch failed (后端服务未启动?):', err.message);
    }
    return null;
  }
}

let _cachedDemoTables = null; // 缓存避免重复调

async function fetchDemoTables() {
  if (_cachedDemoTables) return _cachedDemoTables;
  const resp = await fetch(LLM_API_BASE + '/api/llm/demo_table', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slots: SLOTS }),
  });
  const data = await resp.json();
  if (data.ok && data.data && data.data.tables && data.data.tables.length > 0) {
    _cachedDemoTables = data.data.tables;
    return _cachedDemoTables;
  }
  throw new Error(data.data?.error || '表结构生成失败');
}

function downloadExcelFromTables(tables) {
  /* 用简单的 CSV-like XML Spreadsheet 格式生成多 sheet 的 xlsx (兼容性好) */
  /* 这里用 SpreadsheetML (XML) 格式, Excel/WPS/企微智能表格都能打开 */
  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  xml += '<?mso-application progid="Excel.Sheet"?>\n';
  xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"\n';
  xml += ' xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';

  // 样式
  xml += '<Styles>\n';
  xml += '  <Style ss:ID="header"><Font ss:Bold="1" ss:Size="11"/><Interior ss:Color="#E8E0F7" ss:Pattern="Solid"/></Style>\n';
  xml += '  <Style ss:ID="Default"><Font ss:Size="10"/></Style>\n';
  xml += '</Styles>\n';

  tables.forEach(t => {
    const sheetName = (t.table_name || 'Sheet').replace(/[\/\\?*[\]]/g, '_').slice(0, 31);
    const cols = t.columns || [];
    const rows = t.sample_rows || [];

    xml += `<Worksheet ss:Name="${escapeXml(sheetName)}">\n<Table>\n`;

    // 表头行
    xml += '<Row>\n';
    cols.forEach(col => {
      xml += `  <Cell ss:StyleID="header"><Data ss:Type="String">${escapeXml(col.name)}${col.type ? ' [' + escapeXml(col.type) + ']' : ''}</Data></Cell>\n`;
    });
    xml += '</Row>\n';

    // 数据行
    rows.forEach(row => {
      xml += '<Row>\n';
      cols.forEach(col => {
        const val = row[col.name] !== undefined ? String(row[col.name]) : '';
        const isNum = col.type === '数字' || col.type === '金额';
        const type = isNum && !isNaN(Number(val)) ? 'Number' : 'String';
        xml += `  <Cell><Data ss:Type="${type}">${escapeXml(val)}</Data></Cell>\n`;
      });
      xml += '</Row>\n';
    });

    xml += '</Table>\n</Worksheet>\n';
  });

  xml += '</Workbook>';

  // 下载
  const blob = new Blob([xml], { type: 'application/vnd.ms-excel' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const customerName = SLOTS.q2 || SLOTS.q1 || '客户';
  a.download = `${customerName}_智能表Demo方案.xls`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function escapeXml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* 简易 markdown 渲染（够用即可） */
function renderMarkdown(md) {
  let html = escapeHtml(md);
  html = html.replace(/^### (.+)$/gm, '<h3 style="font-size:14px;margin:14px 0 6px;color:var(--primary);font-weight:500;">$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2 style="font-size:15px;margin:18px 0 8px;color:var(--text);font-weight:500;border-left:3px solid var(--primary);padding-left:10px;">$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1 style="font-size:17px;margin:20px 0 10px;color:var(--primary);font-weight:500;">$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\n\n/g, '</p><p style="margin:8px 0;">');
  html = html.replace(/^- (.+)$/gm, '<li style="margin-left:18px;">$1</li>');
  return '<p style="margin:8px 0;">' + html + '</p>';
}

/* ------------------------- 工具 ------------------------- */

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
function scrollToBottom() {
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 80);
}
